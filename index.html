<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>OpenCV MIDI Bridge - 4x4 ArUco</title>
    <style>
        :root { --bg: #0a0a0a; --panel: #1a1a1a; --accent: #00e5ff; --text: #eee; --danger: #ff4444; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #app { display: flex; width: 100vw; height: 100vh; }
        #viewer { flex-grow: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { position: absolute; width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); opacity: 0.5; }
        canvas#overlay { position: absolute; width: 100%; height: 100%; object-fit: contain; z-index: 5; transform: scaleX(-1); }

        #sidebar { width: 350px; background: var(--panel); border-left: 1px solid #333; overflow-y: auto; padding: 20px; box-sizing: border-box; z-index: 20; }
        .section { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        h2 { color: var(--accent); margin: 0 0 15px 0; font-size: 1.2em; }
        
        .status-box { font-size: 0.8em; padding: 8px; border-radius: 4px; margin-bottom: 10px; border: 1px solid #444; }
        .ok { color: var(--accent); border-color: var(--accent); }
        .err { color: var(--danger); border-color: var(--danger); }

        button { width: 100%; padding: 12px; margin-bottom: 10px; background: transparent; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; cursor: pointer; }
        button:hover { background: var(--accent); color: #000; }
        input, select { width: 100%; padding: 8px; background: #111; border: 1px solid #444; color: #fff; margin-bottom: 10px; }

        @media print {
            body * { display: none !important; }
            #print-area, #print-area * { display: block !important; }
            .print-grid { display: grid !important; grid-template-columns: repeat(4, 1fr); gap: 10mm; padding: 10mm; }
            .marker-unit { text-align: center; color: black !important; page-break-inside: avoid; margin-bottom: 10mm; }
        }
        #print-area { display: none; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="load-text">Cargando Motor OpenCV...</p>
</div>

<div id="app">
    <div id="viewer">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="overlay"></canvas>
    </div>

    <div id="sidebar">
        <h2>Vision Bridge</h2>
        
        <div class="section">
            <h3>Estados</h3>
            <div id="cv-status" class="status-box err">OpenCV: Esperando...</div>
            <div id="signal-status" class="status-box err">Señal: Sin marcadores</div>
            <div id="midi-status" class="status-box err">MIDI: No Iniciado</div>
            <button onclick="initMidi()">ACTIVAR MIDI</button>
        </div>

        <div class="section">
            <h3>Cámara</h3>
            <select id="cam-select"></select>
            <button onclick="startCamera()">INICIAR CÁMARA</button>
        </div>

        <div class="section">
            <h3>Configuración</h3>
            <label>Cantidad (1-32)</label>
            <input type="number" id="marker-count" value="16" min="1" max="32" onchange="buildList()">
            <label>Tamaño Impresión (mm)</label>
            <input type="number" id="print-size" value="35">
            <button onclick="window.print()">IMPRIMIR MARCADORES</button>
        </div>

        <div id="marker-list"></div>
    </div>
</div>

<div id="print-area"><div id="print-grid" class="print-grid"></div></div>

<script>
    const video = document.getElementById('webcam');
    const overlay = document.getElementById('overlay');
    const ctx = overlay.getContext('2d');
    const loadText = document.getElementById('load-text');
    const cvStatus = document.getElementById('cv-status');
    const signalStatus = document.getElementById('signal-status');
    
    let markerConfigs = {};
    let midiOut = null;
    let cvReady = false;
    let animationId = null;
    let currentStream = null;
    let openCvInitStarted = false;
    let arucoBindings = null;
    let detectionBackend = null;
    let jsArucoDetector = null;
    const processingCanvas = document.createElement('canvas');
    const processingCtx = processingCanvas.getContext('2d', { willReadFrequently: true });

    const OPENCV_SOURCES = [
        'https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.12.0-release.1/dist/opencv.js',
        'https://docs.opencv.org/4.x/opencv.js',
        'https://docs.opencv.org/4.9.0/opencv.js',
        'https://docs.opencv.org/4.5.4/opencv.js'
    ];

    const JS_ARUCO_SOURCES = [
        'https://cdn.jsdelivr.net/npm/js-aruco2@2.0.0/src/cv.js',
        'https://cdn.jsdelivr.net/npm/js-aruco2@2.0.0/src/aruco.js'
    ];

    // 1. GESTIÓN DE CARGA
    function setCvError(message) {
        cvStatus.innerText = message;
        cvStatus.className = 'status-box err';
        loadText.innerText = message;
    }

    function loadScript(src) {
        return new Promise((resolve, reject) => {
            const existing = document.querySelector(`script[data-lib-src="${src}"]`);
            if (existing) {
                resolve(src);
                return;
            }

            const script = document.createElement('script');
            script.src = src;
            script.async = true;
            script.dataset.libSrc = src;
            script.onload = () => resolve(src);
            script.onerror = () => reject(new Error('No se pudo cargar: ' + src));
            document.head.appendChild(script);
        });
    }

    async function initJsArucoFallback() {
        loadText.innerText = 'Cargando fallback ArUco (js-aruco2)...';
        try {
            for (const src of JS_ARUCO_SOURCES) {
                await loadScript(src);
            }

            if (!window.AR || typeof AR.Detector !== 'function') {
                throw new Error('AR.Detector no disponible');
            }

            jsArucoDetector = new AR.Detector({ dictionaryName: 'ARUCO' });
            detectionBackend = 'js-aruco2';
            cvReady = true;
            document.getElementById('loader').style.display = 'none';
            cvStatus.innerText = 'Detector: js-aruco2 (fallback)';
            cvStatus.className = 'status-box ok';
            init();
            return true;
        } catch (error) {
            console.error(error);
            return false;
        }
    }

    function resolveArucoBindings() {
        if (!window.cv || !cv.Mat) return null;

        const getDictionaryFn =
            typeof cv.aruco_getPredefinedDictionary === 'function' ? (dictId) => cv.aruco_getPredefinedDictionary(dictId) :
            (cv.aruco && typeof cv.aruco.getPredefinedDictionary === 'function') ? (dictId) => cv.aruco.getPredefinedDictionary(dictId) :
            typeof cv.getPredefinedDictionary === 'function' ? (dictId) => cv.getPredefinedDictionary(dictId) :
            null;

        const detectorCtor =
            typeof cv.ArucoDetector === 'function' ? cv.ArucoDetector :
            typeof cv.aruco_ArucoDetector === 'function' ? cv.aruco_ArucoDetector :
            (cv.aruco && typeof cv.aruco.ArucoDetector === 'function') ? cv.aruco.ArucoDetector :
            null;

        const detectMarkersFn =
            typeof cv.aruco_detectMarkers === 'function' ? (...args) => cv.aruco_detectMarkers(...args) :
            (cv.aruco && typeof cv.aruco.detectMarkers === 'function') ? (...args) => cv.aruco.detectMarkers(...args) :
            typeof cv.detectMarkers === 'function' ? (...args) => cv.detectMarkers(...args) :
            detectorCtor ? (detector, ...args) => detector.detectMarkers(...args) :
            null;

        const generateMarkerFn =
            typeof cv.generateImageMarker === 'function' ? (...args) => cv.generateImageMarker(...args) :
            typeof cv.aruco_generateImageMarker === 'function' ? (...args) => cv.aruco_generateImageMarker(...args) :
            (cv.aruco && typeof cv.aruco.generateImageMarker === 'function') ? (...args) => cv.aruco.generateImageMarker(...args) :
            typeof cv.drawMarker === 'function' ? (...args) => cv.drawMarker(...args) :
            typeof cv.aruco_drawMarker === 'function' ? (...args) => cv.aruco_drawMarker(...args) :
            (cv.aruco && typeof cv.aruco.drawMarker === 'function') ? (...args) => cv.aruco.drawMarker(...args) :
            null;

        if (!getDictionaryFn || !detectMarkersFn) return null;

        const dict4x4_50 =
            typeof cv.DICT_4X4_50 !== 'undefined' ? cv.DICT_4X4_50 :
            typeof cv.aruco_DICT_4X4_50 !== 'undefined' ? cv.aruco_DICT_4X4_50 :
            0;

        return {
            getDictionary: getDictionaryFn,
            detectMarkers: detectMarkersFn,
            generateMarker: generateMarkerFn,
            createDetector: detectorCtor ? (dictionary, params, refineParams) => {
                try {
                    return new detectorCtor(dictionary, params, refineParams);
                } catch (error3) {
                    try {
                        return new detectorCtor(dictionary, params);
                    } catch (error2) {
                        return new detectorCtor(dictionary);
                    }
                }
            } : null,
            usesDetectorInstance: !!detectorCtor && !(typeof cv.aruco_detectMarkers === 'function' || (cv.aruco && typeof cv.aruco.detectMarkers === 'function') || typeof cv.detectMarkers === 'function'),
            dict4x4_50
        };
    }

    function hasAruco() {
        arucoBindings = resolveArucoBindings();
        return !!arucoBindings;
    }

    function waitRuntimeAndAruco(timeoutMs = 15000) {
        return new Promise((resolve, reject) => {
            const start = Date.now();
            const check = () => {
                if (window.cv && cv.Mat && hasAruco()) return resolve();
                if (Date.now() - start > timeoutMs) return reject(new Error('OpenCV cargó, pero ArUco no está disponible'));
                setTimeout(check, 100);
            };

            if (window.cv && typeof cv.onRuntimeInitialized !== 'undefined') {
                const previous = cv.onRuntimeInitialized;
                cv.onRuntimeInitialized = () => {
                    if (typeof previous === 'function') previous();
                    check();
                };
            }

            check();
        });
    }

    async function initOpenCv() {
        if (openCvInitStarted) return;
        openCvInitStarted = true;
        loadText.innerText = 'Cargando Motor OpenCV...';

        for (const src of OPENCV_SOURCES) {
            try {
                loadText.innerText = 'Intentando: ' + src;
                await loadScript(src);

                try {
                    await waitRuntimeAndAruco();
                } catch (arucoError) {
                    const fallbackReady = await initJsArucoFallback();
                    if (!fallbackReady) {
                        setCvError('OpenCV cargó sin ArUco y fallback no disponible');
                    }
                    console.error(arucoError);
                    return;
                }

                detectionBackend = 'opencv';
                cvReady = true;
                document.getElementById('loader').style.display = 'none';
                cvStatus.innerText = 'OpenCV: LISTO';
                cvStatus.className = 'status-box ok';
                init();
                return;
            } catch (error) {
                console.warn(error.message);
            }
        }

        const fallbackReady = await initJsArucoFallback();
        if (!fallbackReady) {
            setCvError('OpenCV/ArUco: Error de carga');
        }
    }

    function createDetectorParameters() {
        if (typeof cv.aruco_DetectorParameters === 'function') return new cv.aruco_DetectorParameters();
        if (cv.aruco && typeof cv.aruco.DetectorParameters === 'function') return new cv.aruco.DetectorParameters();
        if (typeof cv.DetectorParameters === 'function') return new cv.DetectorParameters();
        if (cv.aruco && cv.aruco.DetectorParameters && typeof cv.aruco.DetectorParameters.create === 'function') return cv.aruco.DetectorParameters.create();
        if (cv.aruco_DetectorParameters && typeof cv.aruco_DetectorParameters.create === 'function') return cv.aruco_DetectorParameters.create();
        if (cv.DetectorParameters && typeof cv.DetectorParameters.create === 'function') return cv.DetectorParameters.create();
        return null;
    }

    function createRefineParameters() {
        try {
            if (typeof cv.aruco_RefineParameters === 'function') return new cv.aruco_RefineParameters(10.0, 3.0, true);
        } catch (error) {
            console.warn('No se pudo crear aruco_RefineParameters con argumentos por defecto:', error);
        }

        try {
            if (cv.aruco && typeof cv.aruco.RefineParameters === 'function') return new cv.aruco.RefineParameters(10.0, 3.0, true);
        } catch (error) {
            console.warn('No se pudo crear aruco.RefineParameters con argumentos por defecto:', error);
        }

        return null;
    }

    function detectMarkersCompat(gray, dictionary, corners, ids, params, rejected) {
        if (!arucoBindings) throw new Error('ArUco bindings no disponibles');
        const refineParams = arucoBindings.usesDetectorInstance ? createRefineParameters() : null;
        const detector = arucoBindings.usesDetectorInstance && arucoBindings.createDetector
            ? arucoBindings.createDetector(dictionary, params, refineParams)
            : null;

        try {
            if (params) {
                if (detector) {
                    arucoBindings.detectMarkers(detector, gray, corners, ids, rejected);
                } else {
                    arucoBindings.detectMarkers(gray, dictionary, corners, ids, params, rejected);
                }
            } else {
                if (detector) {
                    arucoBindings.detectMarkers(detector, gray, corners, ids, rejected);
                } else {
                    arucoBindings.detectMarkers(gray, dictionary, corners, ids);
                }
            }
        } catch (error) {
            if (detector) {
                arucoBindings.detectMarkers(detector, gray, corners, ids, rejected);
            } else {
                arucoBindings.detectMarkers(gray, dictionary, corners, ids);
            }
        } finally {
            if (detector && typeof detector.delete === 'function') {
                detector.delete();
            }
            if (refineParams && typeof refineParams.delete === 'function') {
                refineParams.delete();
            }
        }
    }

    function setSignal(active) {
        signalStatus.innerText = active ? 'Señal: Detectando marcadores' : 'Señal: Sin marcadores';
        signalStatus.className = active ? 'status-box ok' : 'status-box err';
    }

    async function init() {
        buildList();
        const devices = await navigator.mediaDevices.enumerateDevices();
        const select = document.getElementById('cam-select');
        select.innerHTML = '';
        devices.filter(d => d.kind === 'videoinput').forEach((d, index) => {
            select.add(new Option(d.label || `Cámara ${index + 1}`, d.deviceId));
        });
    }

    // 2. GESTIÓN MIDI (Con manejo de errores para Firefox)
    async function initMidi() {
        const mStatus = document.getElementById('midi-status');
        if (!navigator.requestMIDIAccess) {
            mStatus.innerText = "MIDI: No soportado en este navegador (Usa Chrome)";
            return;
        }

        try {
            const midi = await navigator.requestMIDIAccess();
            const outputs = Array.from(midi.outputs.values());
            if (outputs.length > 0) {
                midiOut = outputs[0];
                mStatus.innerText = "MIDI: Conectado a " + midiOut.name;
                mStatus.className = "status-box ok";
            } else {
                mStatus.innerText = "MIDI: Sin dispositivos (Abre loopMIDI)";
            }
        } catch (e) {
            mStatus.innerText = "MIDI: Permiso denegado";
            console.error(e);
        }
    }

    // 3. LÓGICA DE CÁMARA Y DETECCIÓN
    async function startCamera() {
        if (!cvReady) return alert("Espera a que OpenCV cargue");
        try {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }

            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const selectedDevice = document.getElementById('cam-select').value;
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { deviceId: selectedDevice ? { exact: selectedDevice } : undefined, width: 1280, height: 720 }
            });

            currentStream = stream;
            video.srcObject = stream;
            video.onloadedmetadata = async () => {
                try {
                    await video.play();
                } catch (playError) {
                    console.warn('No se pudo reproducir video automáticamente:', playError);
                }

                const trackSettings = stream.getVideoTracks()[0]?.getSettings?.() || {};
                const frameWidth = video.videoWidth || trackSettings.width || 1280;
                const frameHeight = video.videoHeight || trackSettings.height || 720;

                if (!frameWidth || !frameHeight) {
                    throw new Error('La cámara no entregó dimensiones válidas');
                }

                video.width = frameWidth;
                video.height = frameHeight;
                overlay.width = frameWidth;
                overlay.height = frameHeight;
                processingCanvas.width = frameWidth;
                processingCanvas.height = frameHeight;
                startProcessing();
            };
        } catch (error) {
            alert('No se pudo iniciar la cámara. Revisa permisos HTTPS/localhost.');
            console.error(error);
        }
    }

    function startProcessing() {
        if (detectionBackend === 'js-aruco2') {
            startProcessingJsAruco();
            return;
        }

        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }

        arucoBindings = resolveArucoBindings();
        if (!arucoBindings) {
            setCvError('ArUco no está disponible en la build cargada');
            return;
        }

        const frameWidth = video.width || video.videoWidth;
        const frameHeight = video.height || video.videoHeight;
        if (!frameWidth || !frameHeight) {
            console.error('Dimensiones de video inválidas para OpenCV:', { frameWidth, frameHeight });
            setSignal(false);
            return;
        }

        const src = new cv.Mat(frameHeight, frameWidth, cv.CV_8UC4);
        const gray = new cv.Mat();
        const dictionary = arucoBindings.getDictionary(arucoBindings.dict4x4_50);
        const params = createDetectorParameters();
        const markerCorners = new cv.MatVector();
        const markerIds = new cv.Mat();
        const rejected = new cv.MatVector();
        const cap = new cv.VideoCapture(video);

        function process() {
            try {
                cap.read(src);
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
                detectMarkersCompat(gray, dictionary, markerCorners, markerIds, params, rejected);

                ctx.clearRect(0, 0, overlay.width, overlay.height);
                let anyDetected = false;

                if (markerIds.rows > 0) {
                    const maxMarkers = parseInt(document.getElementById('marker-count').value, 10);

                    for (let i = 0; i < markerIds.rows; ++i) {
                        const id = markerIds.data32S[i];
                        if (id >= maxMarkers || id < 0 || id > 31) continue;

                        anyDetected = true;
                        if (!markerConfigs[id]) markerConfigs[id] = { ch: 1, base: 10 + (id * 3) };

                        const corners = markerCorners.get(i);
                        const points = corners.data32F;

                        ctx.strokeStyle = '#00ffcc';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(points[0], points[1]);
                        ctx.lineTo(points[2], points[3]);
                        ctx.lineTo(points[4], points[5]);
                        ctx.lineTo(points[6], points[7]);
                        ctx.closePath();
                        ctx.stroke();

                        ctx.fillStyle = '#00ffcc';
                        ctx.font = 'bold 18px Segoe UI';
                        ctx.fillText(`ID ${id}`, points[0], Math.max(18, points[1] - 6));

                        if (midiOut) {
                            const centerX = (points[0] + points[2] + points[4] + points[6]) / 4;
                            const xMidi = Math.max(0, Math.min(127, Math.round((centerX / overlay.width) * 127)));
                            midiOut.send([0xB0 + (markerConfigs[id].ch - 1), markerConfigs[id].base, xMidi]);
                        }

                        corners.delete();
                    }
                }

                setSignal(anyDetected);
            } catch (error) {
                console.error('Error en detección:', error);
                setSignal(false);
            }

            animationId = requestAnimationFrame(process);
        }

        animationId = requestAnimationFrame(process);
    }

    function startProcessingJsAruco() {
        if (!jsArucoDetector) {
            setCvError('Fallback ArUco no inicializado');
            return;
        }

        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }

        processingCanvas.width = overlay.width;
        processingCanvas.height = overlay.height;

        function process() {
            try {
                processingCtx.drawImage(video, 0, 0, overlay.width, overlay.height);
                const imageData = processingCtx.getImageData(0, 0, overlay.width, overlay.height);
                const markers = jsArucoDetector.detect(imageData) || [];

                ctx.clearRect(0, 0, overlay.width, overlay.height);
                let anyDetected = false;
                const maxMarkers = parseInt(document.getElementById('marker-count').value, 10);

                for (const marker of markers) {
                    const id = marker.id;
                    if (typeof id !== 'number' || id < 0 || id > 31 || id >= maxMarkers) continue;
                    if (!Array.isArray(marker.corners) || marker.corners.length < 4) continue;

                    anyDetected = true;
                    if (!markerConfigs[id]) markerConfigs[id] = { ch: 1, base: 10 + (id * 3) };

                    const c0 = marker.corners[0];
                    const c1 = marker.corners[1];
                    const c2 = marker.corners[2];
                    const c3 = marker.corners[3];

                    ctx.strokeStyle = '#00ffcc';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(c0.x, c0.y);
                    ctx.lineTo(c1.x, c1.y);
                    ctx.lineTo(c2.x, c2.y);
                    ctx.lineTo(c3.x, c3.y);
                    ctx.closePath();
                    ctx.stroke();

                    ctx.fillStyle = '#00ffcc';
                    ctx.font = 'bold 18px Segoe UI';
                    ctx.fillText(`ID ${id}`, c0.x, Math.max(18, c0.y - 6));

                    if (midiOut) {
                        const centerX = (c0.x + c1.x + c2.x + c3.x) / 4;
                        const xMidi = Math.max(0, Math.min(127, Math.round((centerX / overlay.width) * 127)));
                        midiOut.send([0xB0 + (markerConfigs[id].ch - 1), markerConfigs[id].base, xMidi]);
                    }
                }

                setSignal(anyDetected);
            } catch (error) {
                console.error('Error en detección fallback:', error);
                setSignal(false);
            }

            animationId = requestAnimationFrame(process);
        }

        animationId = requestAnimationFrame(process);
    }

    // 4. GENERADOR DE IMPRESIÓN
    function buildList() {
        const count = parseInt(document.getElementById('marker-count').value, 10);
        const container = document.getElementById('marker-list');
        container.innerHTML = '<h3>Asignaciones</h3>';
        const grid = document.getElementById('print-grid');
        grid.innerHTML = '';
        const size = document.getElementById('print-size').value;
        const bindings = window.cv ? resolveArucoBindings() : null;

        for (let i = 0; i < count; i++) {
            if (!markerConfigs[i]) markerConfigs[i] = { ch: 1, base: 10+(i*3) };
            
            // UI Sidebar
            container.innerHTML += `<div style="background:#111;padding:8px;margin-bottom:5px;font-size:12px">
                ID ${i} | CC ${markerConfigs[i].base} | CH <input type="number" value="${markerConfigs[i].ch}" style="width:35px" onchange="markerConfigs[${i}].ch=parseInt(this.value)">
            </div>`;

            // Preparar Impresión (Solo si OpenCV está listo)
            if (cvReady && bindings && typeof bindings.getDictionary === 'function' && typeof bindings.generateMarker === 'function') {
                const canvas = document.createElement('canvas');
                canvas.width = 200; canvas.height = 200;
                let markerMat = new cv.Mat();
                let dict = bindings.getDictionary(bindings.dict4x4_50);
                bindings.generateMarker(dict, i, 200, markerMat, 1);
                cv.imshow(canvas, markerMat);
                
                const unit = document.createElement('div');
                unit.className = 'marker-unit';
                const img = new Image();
                img.src = canvas.toDataURL();
                img.style.width = size + "mm";
                unit.appendChild(img);
                unit.innerHTML += `<div style="font-family:monospace; font-weight:bold">ID ${i}</div>`;
                grid.appendChild(unit);
                markerMat.delete();
            }
        }
    }

    initOpenCv();
